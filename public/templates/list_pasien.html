{% extends "layout.html" %}

{% block title %}Daftar Pasien{% endblock %}

{% block content %}
<div class="container">
    <h2>Daftar Pasien Hipertensi</h2>
    <table border="1" cellpadding="8" cellspacing="0" style="width:100%; border-collapse: collapse;">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama Pasien</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for pasien in pasien_list %}
            <tr>
                <td>{{ pasien.id }}</td>
                <td>{{ pasien.nama }}</td>
                <td>
                    <a href="{{ url_for('main.view_rekam_medis', pasien_id=pasien.id) }}">
                        View dan catat rekam medis
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
