<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Medikara</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }
    .auth-card h3 {
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #4e73df;
    }
    .form-control {
      border-radius: 8px;
    }
    .btn-auth {
      background: #4e73df;
      color: #fff;
      border-radius: 8px;
      font-weight: 500;
      transition: 0.3s;
    }
    .btn-auth:hover {
      background: #2e59d9;
    }
    .toggle-link {
      text-align: center;
      margin-top: 1rem;
    }
    .toggle-link a {
      color: #1cc88a;
      text-decoration: none;
      cursor: pointer;
    }
    .toggle-link a:hover {
      text-decoration: underline;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <!-- Login Form -->
    <div id="login-form">
      <h3>Login</h3>
      <form method="POST" action="{{ url_for('main.login') }}">
        <div class="mb-3">
          <label for="login-username" class="form-label">Username</label>
          <input type="text" class="form-control" id="login-username" name="username" required autofocus>
        </div>
        <div class="mb-3">
          <label for="login-password" class="form-label">Password</label>
          <input type="password" class="form-control" id="login-password" name="password" required>
        </div>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-danger" role="alert">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}
        <button type="submit" class="btn btn-auth w-100">Login</button>
      </form>
      <div class="toggle-link">
        <p>Dont have an account? <a onclick="toggleForms()">Register</a></p>
      </div>
    </div>

    <!-- Register Form -->
    <div id="register-form" class="hidden">
      <h3>Register</h3>
      <form method="POST" action="{{ url_for('main.register') }}">
        <div class="mb-3">
          <label for="fullname" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullname" name="fullname" required>
        </div>
        <div class="mb-3">
          <label for="reg-username" class="form-label">Username</label>
          <input type="text" class="form-control" id="reg-username" name="username" required>
        </div>
        <div class="mb-3">
          <label for="reg-email" class="form-label">Email</label>
          <input type="email" class="form-control" id="reg-email" name="email" required>
        </div>
        <div class="mb-3">
          <label for="reg-password" class="form-label">Password</label>
          <input type="password" class="form-control" id="reg-password" name="password" required>
        </div>
        <button type="submit" class="btn btn-auth w-100">Register</button>
      </form>
      <div class="toggle-link">
        <p>Already have an account? <a onclick="toggleForms()">Login</a></p>
      </div>
    </div>
  </div>

  <script>
    function toggleForms() {
      document.getElementById('login-form').classList.toggle('hidden');
      document.getElementById('register-form').classList.toggle('hidden');
    }
  </script>
</body>
</html>
