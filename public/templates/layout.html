<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedikaRantai - Dashboard Monitoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="text-center mb-4">MedikaRantai</h4>
            <hr>
            <div class="menu-item"><a href="/"><i class="fas fa-home me-2"></i> Dashboard</a></div>
            <div class="menu-item"><a href="/list-pasien"><i class="fas fa-user-md me-2"></i> Data Pasien</a></div>
            <div class="menu-item"><a href="/logout"><i class="fas fa-link me-2"></i> Logout</a></div>
        </div>

        <div class="col-md-10 p-4">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
</body>
</html>

<script>
  setTimeout(function() {
    const alerts = document.querySelectorAll('.alert');
    alerts.forEach(alert => {
      alert.style.display = 'none';
    });
  }, 3000); // 3000 ms = 3 seconds
</script>
