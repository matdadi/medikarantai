{% extends "layout.html" %}

{% block title %}Tambah Pasien Baru{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4 text-primary fw-bold">Tambah Pasien Baru</h2>
    <form method="POST" action="{{ url_for('backoffice.submit_patient_detail') }}" class="card p-4 shadow-sm rounded">
        <div class="mb-3">
            <label for="fullname" class="form-label fw-semibold">Nama Lengkap</label>
            <input type="text" class="form-control" id="fullname" name="fullname" placeholder="Masukkan nama pasien" required>
        </div>
        <div class="d-flex justify-content-between">
            <a href="{{ url_for('backoffice.patients') }}" class="btn btn-secondary">⬅ Kembali</a>
            <button type="submit" class="btn btn-primary">💾 Simpan</button>
        </div>
    </form>
</div>
{% endblock %}
